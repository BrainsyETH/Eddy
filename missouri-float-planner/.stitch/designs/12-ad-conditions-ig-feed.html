<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad — Know Before You Go (Instagram Feed)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0F2D35 0%, #163F4A 60%, #1D525F 100%);
      color: white;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .canvas::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(45,120,137,0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 90%, rgba(78,184,107,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .mascot {
      width: 220px;
      height: 220px;
      filter: drop-shadow(0 4px 24px rgba(240,112,82,0.3));
      animation: float 6s ease-in-out infinite;
      position: relative;
      z-index: 1;
      margin-bottom: 24px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .headline {
      font-family: 'Fredoka', sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: #F07052;
      line-height: 1.1;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .subhead {
      font-size: 22px;
      color: rgba(255,255,255,0.8);
      line-height: 1.4;
      margin-bottom: 32px;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .condition-card {
      background: rgba(255,255,255,0.95);
      border: 2px solid #1D525F;
      border-radius: 12px;
      box-shadow: 4px 4px 0 #857D70;
      padding: 20px 28px;
      width: 480px;
      color: #2D2A24;
      text-align: left;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #EDEBE6;
    }

    .card-header-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
    }

    .card-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #2D2A24;
    }

    .river-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .river-row + .river-row {
      border-top: 1px solid #EDEBE6;
    }

    .river-name {
      font-size: 15px;
      font-weight: 600;
      color: #2D2A24;
    }

    .river-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .condition-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-optimal { background: #DCF4E2; color: #347A47; border: 1px solid #95D9A7; }
    .badge-high { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }
    .badge-low { background: #FFFBEB; color: #92400E; border: 1px solid #FCD34D; }

    .gauge {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #857D70;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 40px;
      background: #F07052;
      color: white;
      border: 2px solid #2D2A24;
      border-radius: 6px;
      font-size: 20px;
      font-weight: 600;
      box-shadow: 3px 3px 0 #A49C8E;
      cursor: pointer;
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
    }

    .badge-free {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 9999px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }

    .domain {
      position: absolute;
      bottom: 24px;
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img
      src="../../public/blog/planning-first-trip/eddy-reference.png"
      alt="Eddy the Otter"
      class="mascot"
    >
    <h1 class="headline">Real-Time River Conditions</h1>
    <p class="subhead">Live USGS gauge data for Ozarks rivers</p>

    <div class="condition-card">
      <div class="card-header">
        <img src="../../public/blog/planning-first-trip/eddy-reference.png" alt="Eddy" class="card-header-icon">
        <span class="card-title">Live Conditions</span>
      </div>
      <div class="river-row">
        <span class="river-name">Current River</span>
        <div class="river-meta">
          <span class="gauge">3.2 ft</span>
          <span class="condition-badge badge-optimal">Optimal</span>
        </div>
      </div>
      <div class="river-row">
        <span class="river-name">Jacks Fork</span>
        <div class="river-meta">
          <span class="gauge">2.8 ft</span>
          <span class="condition-badge badge-optimal">Optimal</span>
        </div>
      </div>
      <div class="river-row">
        <span class="river-name">Meramec River</span>
        <div class="river-meta">
          <span class="gauge">7.1 ft</span>
          <span class="condition-badge badge-high">High</span>
        </div>
      </div>
      <div class="river-row">
        <span class="river-name">Huzzah Creek</span>
        <div class="river-meta">
          <span class="gauge">1.8 ft</span>
          <span class="condition-badge badge-low">Low</span>
        </div>
      </div>
    </div>

    <button class="cta-btn">Plan Your Float &rarr;</button>
    <span class="badge-free">Free &middot; No Account Needed</span>
    <span class="domain">eddy.guide</span>
  </div>
</body>
</html>
