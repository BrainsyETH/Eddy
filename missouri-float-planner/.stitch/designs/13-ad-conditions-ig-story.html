<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad — Know Before You Go (Instagram Stories)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0F2D35 0%, #163F4A 40%, #1D525F 70%, #0F2D35 100%);
      color: white;
    }

    .canvas {
      width: 1080px;
      height: 1920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 100px 72px 120px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .canvas::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 50% 20%, rgba(240,112,82,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 30% 70%, rgba(45,120,137,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 90%, rgba(78,184,107,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .brand {
      font-family: 'Fredoka', sans-serif;
      font-size: 72px;
      font-weight: 700;
      background: linear-gradient(135deg, #F07052, #2D7889);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 22px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
      z-index: 1;
    }

    .mascot {
      width: 300px;
      height: 300px;
      filter: drop-shadow(0 8px 32px rgba(240,112,82,0.3));
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .message {
      font-size: 32px;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
      max-width: 700px;
    }

    .condition-card {
      background: rgba(255,255,255,0.95);
      border: 2px solid #1D525F;
      border-radius: 12px;
      box-shadow: 4px 4px 0 #857D70;
      padding: 20px 28px;
      width: 520px;
      color: #2D2A24;
      text-align: left;
    }

    .card-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2D2A24;
    }

    .river-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .river-row + .river-row { border-top: 1px solid #EDEBE6; }

    .river-name {
      font-size: 16px;
      font-weight: 600;
    }

    .condition-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-optimal { background: #DCF4E2; color: #347A47; border: 1px solid #95D9A7; }
    .badge-high { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 20px 48px;
      background: #F07052;
      color: white;
      border: 2px solid #2D2A24;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 600;
      box-shadow: 4px 4px 0 #A49C8E;
      cursor: pointer;
    }

    .swipe-hint {
      font-size: 16px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }

    .arrow-up {
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .domain {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="top">
      <div class="brand">Eddy</div>
      <div class="tagline">Your River Guide</div>
    </div>

    <div class="middle">
      <img
        src="https://q5skne5bn5nbyxfw.public.blob.vercel-storage.com/Eddy_Otter/Eddy_the_Otter.png"
        alt="Eddy the Otter"
        class="mascot"
      >
      <p class="message">Check live conditions on<br>Missouri rivers before you float</p>

      <div class="condition-card">
        <div class="card-title">Live Right Now</div>
        <div class="river-row">
          <span class="river-name">Current River</span>
          <span class="condition-badge badge-optimal">Optimal</span>
        </div>
        <div class="river-row">
          <span class="river-name">Jacks Fork</span>
          <span class="condition-badge badge-optimal">Optimal</span>
        </div>
        <div class="river-row">
          <span class="river-name">Meramec River</span>
          <span class="condition-badge badge-high">High</span>
        </div>
      </div>
    </div>

    <div class="bottom">
      <button class="cta-btn"><span class="arrow-up">&uarr;</span> Learn More</button>
      <span class="domain">eddy.guide</span>
    </div>
  </div>
</body>
</html>
