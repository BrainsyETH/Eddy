<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USGS Missouri Surface Water</title>
  <link rel="stylesheet" href="assets/eddy-tokens.css" />
  <style>
    @font-face { font-family: 'Geist'; src: url('assets/fonts/GeistVF.woff') format('woff'); font-weight: 100 900; font-display: swap; }
    @font-face { font-family: 'Geist Mono'; src: url('assets/fonts/GeistMonoVF.woff') format('woff'); font-weight: 100 900; font-display: swap; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1F1A14; }
    body { font-family: 'Geist', system-ui, sans-serif; color: #1F1A14; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script src="mo-projection.js"></script>
  <script src="mo-real-data.js"></script>
  <script src="mo-history.js"></script>
  <script src="floater-overlay.js"></script>
  <script type="text/babel" src="mo-map.jsx"></script>
  <script type="text/babel" src="mo-ui.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "animate": true,
      "showLegend": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [dayOffset, setDayOffset] = useState(0);
      const [hoveredRiver, setHoveredRiver] = useState(null);
      const [focusedRiver, setFocusedRiver] = useState(null);
      const [hoveredGauge, setHoveredGauge] = useState(null);
      const [focusedGauge, setFocusedGauge] = useState(null);

      const snapshot = useMemo(() => window.snapshotAt(dayOffset), [dayOffset]);

      return (
        <div data-screen-label="MO Surface Water" style={{ position: "absolute", inset: 0 }}>
          <GeometryPaths />
          <MOMap snapshot={snapshot}
            hoveredRiver={hoveredRiver} setHoveredRiver={setHoveredRiver}
            focusedRiver={focusedRiver} setFocusedRiver={setFocusedRiver}
            hoveredGauge={hoveredGauge} setHoveredGauge={setHoveredGauge}
            setFocusedGauge={setFocusedGauge}
            animate={t.animate} />

          <HeaderBar dayOffset={dayOffset} />
          {t.showLegend && <PercentileLegend />}
          <StatewideSummary snapshot={snapshot} />
          {!focusedGauge && <GaugeHover hoveredGauge={hoveredGauge} />}
          {!focusedGauge && !hoveredGauge && (hoveredRiver || focusedRiver) && (
            <FloaterCard river={hoveredRiver || focusedRiver} />
          )}
          <GaugeDetail focusedGauge={focusedGauge} dayOffset={dayOffset}
            onClose={() => setFocusedGauge(null)} />
          <TimeScrubber dayOffset={dayOffset} setDayOffset={setDayOffset} />

          <TweaksPanel>
            <TweakSection label="Display" />
            <TweakToggle label="Animate flow" value={t.animate} onChange={v => setTweak("animate", v)} />
            <TweakToggle label="Legend" value={t.showLegend} onChange={v => setTweak("showLegend", v)} />
          </TweaksPanel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
