# .github/workflows/render-reusable.yml
# Containerized render core shared by render-clip.yml and render-social-video.yml.
# A preflight checks whether the prebuilt image exists; if so the fast container
# job renders from the baked bundle, otherwise a runtime fallback job renders the
# old way (checkout + npm ci + render via the entry point) — so a missing/broken
# image degrades to "slow" instead of breaking every render. The fallback never
# runs when the image is present, so it can't affect the hot path.
#
# Both jobs run the SAME scripts/render-core.sh (render + audio + upload): baked
# into the image for the container, run from the checkout for the fallback — one
# source of truth, no checkout (or git) needed inside the container.

name: Render (reusable)

on:
  workflow_call:
    inputs:
      composition_id:
        description: 'Remotion composition id to render'
        required: true
        type: string
      input_props:
        description: 'JSON-encoded input props'
        required: true
        type: string
      output_filename:
        description: 'Output filename stem (no extension)'
        required: true
        type: string
      blob_prefix:
        description: 'Vercel Blob path prefix (clips | social-videos)'
        required: true
        type: string
      audio_mode:
        description: 'clip = keep the clip audio; social = mux + validate background music'
        required: true
        type: string
    secrets:
      BLOB_READ_WRITE_TOKEN:
        required: true
    outputs:
      clip_url:
        description: 'Public Blob URL of the finished MP4 (from whichever path ran)'
        value: ${{ jobs.container-render.outputs.clip_url || jobs.runtime-render.outputs.clip_url }}
      audio_verified:
        value: ${{ jobs.container-render.outputs.audio_verified || jobs.runtime-render.outputs.audio_verified }}
      audio_kib:
        value: ${{ jobs.container-render.outputs.audio_kib || jobs.runtime-render.outputs.audio_kib }}
      total_silence_s:
        value: ${{ jobs.container-render.outputs.total_silence_s || jobs.runtime-render.outputs.total_silence_s }}

jobs:
  # Pick the render path deterministically: is the prebuilt image available?
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      packages: read
    outputs:
      use_container: ${{ steps.check.outputs.use_container }}
    steps:
      - name: Check render image
        id: check
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          if docker manifest inspect ghcr.io/brainsyeth/eddy-remotion:latest >/dev/null 2>&1; then
            echo "use_container=true" >> "$GITHUB_OUTPUT"
            echo "Render image present — fast container path."
          else
            echo "::warning::ghcr.io/brainsyeth/eddy-remotion:latest not found — using the slower runtime render. Build it via build-remotion-image.yml."
            echo "use_container=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Fast path: render in the prebuilt image from the baked /app/build bundle.
  container-render:
    needs: preflight
    if: ${{ needs.preflight.outputs.use_container == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/brainsyeth/eddy-remotion:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: /app
    outputs:
      clip_url: ${{ steps.core.outputs.clip_url }}
      audio_verified: ${{ steps.core.outputs.audio_verified }}
      audio_kib: ${{ steps.core.outputs.audio_kib }}
      total_silence_s: ${{ steps.core.outputs.total_silence_s }}
    steps:
      - name: Write input props
        env:
          INPUT_PROPS_JSON: ${{ inputs.input_props }}
        run: printf '%s' "$INPUT_PROPS_JSON" > /tmp/props.json

      - name: Render + audio + upload
        id: core
        env:
          COMPOSITION_ID: ${{ inputs.composition_id }}
          OUTPUT_FILENAME: ${{ inputs.output_filename }}
          BLOB_PREFIX: ${{ inputs.blob_prefix }}
          AUDIO_MODE: ${{ inputs.audio_mode }}
          RENDER_MODE: bundle
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: bash scripts/render-core.sh

  # ── Fallback: image unavailable → render on the host the old way (slower).
  runtime-render:
    needs: preflight
    if: ${{ needs.preflight.outputs.use_container != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: missouri-float-planner/remotion
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    outputs:
      clip_url: ${{ steps.core.outputs.clip_url }}
      audio_verified: ${{ steps.core.outputs.audio_verified }}
      audio_kib: ${{ steps.core.outputs.audio_kib }}
      total_silence_s: ${{ steps.core.outputs.total_silence_s }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: missouri-float-planner/remotion/package-lock.json
      - name: Install Remotion dependencies
        run: npm ci

      - name: Write input props
        env:
          INPUT_PROPS_JSON: ${{ inputs.input_props }}
        run: printf '%s' "$INPUT_PROPS_JSON" > /tmp/props.json

      - name: Render + audio + upload
        id: core
        env:
          COMPOSITION_ID: ${{ inputs.composition_id }}
          OUTPUT_FILENAME: ${{ inputs.output_filename }}
          BLOB_PREFIX: ${{ inputs.blob_prefix }}
          AUDIO_MODE: ${{ inputs.audio_mode }}
          RENDER_MODE: entry
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: bash scripts/render-core.sh
