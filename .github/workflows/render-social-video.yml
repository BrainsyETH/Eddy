# .github/workflows/render-social-video.yml
# Renders a Remotion composition to MP4 and publishes to social platforms.
#
# Single render per video — the callback publishes to all platforms
# (Instagram + Facebook) from one rendered file.
#
# Audio: ffmpeg always re-encodes audio from source MP3 into the final
# MP4 at Meta-compatible specs (AAC 48kHz stereo, faststart).
# Remotion's <Audio> is kept for preview but its 44.1kHz output is
# replaced by the normalize step. Workflow hard-fails if no audio.

name: Render Social Video

on:
  workflow_dispatch:
    inputs:
      post_ids:
        description: 'Comma-separated social_posts record IDs to publish after render'
        required: true
        type: string
      composition_id:
        description: 'Remotion composition ID (e.g. social-gauge-portrait)'
        required: true
        type: string
      input_props:
        description: 'JSON-encoded input props for the composition'
        required: true
        type: string
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Remotion dependencies
        uses: actions/cache@v4
        with:
          path: missouri-float-planner/remotion/node_modules
          key: remotion-deps-${{ hashFiles('missouri-float-planner/remotion/package.json') }}
          restore-keys: remotion-deps-

      - name: Install Remotion dependencies
        working-directory: missouri-float-planner/remotion
        run: npm install

      - name: Write input props to file
        env:
          INPUT_PROPS_JSON: ${{ inputs.input_props }}
        run: |
          printf '%s' "$INPUT_PROPS_JSON" > /tmp/input-props.json
          echo "Props written ($(wc -c < /tmp/input-props.json) bytes)"

      - name: Verify audio file exists
        working-directory: missouri-float-planner/remotion
        run: |
          echo "=== Checking public/audio/ ==="
          ls -la public/audio/
          file public/audio/background-music.wav
          echo "=== Audio file confirmed ==="

      - name: Render video
        working-directory: missouri-float-planner/remotion
        run: |
          OUTFILE="/tmp/${{ inputs.output_filename }}.mp4"

          npx remotion render \
            --entry-point=src/index.ts \
            --props=/tmp/input-props.json \
            --codec=h264 \
            --audio-codec=aac \
            --enforce-audio-track \
            --disable-parallel-encoding \
            --crf=18 \
            --log=verbose \
            --public-dir=./public \
            "${{ inputs.composition_id }}" \
            "$OUTFILE"

          echo "Render complete: $(stat -c%s "$OUTFILE") bytes"
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Normalize audio for Meta Reels
        id: normalize
        working-directory: missouri-float-planner/remotion
        run: |
          set -euxo pipefail

          OUTFILE="/tmp/${{ inputs.output_filename }}.mp4"
          AUDIO_SRC="public/audio/background-music.wav"

          DURATION=$(npx remotion ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$OUTFILE")
          echo "Video duration: ${DURATION}s"

          if [ -z "$DURATION" ]; then
            echo "::error::Could not read video duration"; exit 1
          fi

          # Re-encode audio to Meta-compatible specs (AAC 48kHz stereo, 192kb/s).
          # Remotion ships a stripped ffmpeg without afade — we rely on plain
          # volume scaling. -stream_loop -1 on the source guarantees coverage
          # even if the video outruns the MP3.
          # Capture stderr so we can parse the mux stats (audio:NKiB) as a
          # fast silence gate before running silencedetect.
          NORMALIZE_LOG=$(npx remotion ffmpeg -y \
            -stream_loop -1 -i "$AUDIO_SRC" \
            -i "$OUTFILE" \
            -c:v copy \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -t "$DURATION" \
            -af "volume=0.9" \
            -map 1:v:0 -map 0:a:0 \
            -movflags +faststart \
            "/tmp/normalized.mp4" 2>&1)
          echo "$NORMALIZE_LOG"

          mv "/tmp/normalized.mp4" "$OUTFILE"
          echo "Audio normalized: $(stat -c%s "$OUTFILE") bytes"

          echo "=== Encoded audio size gate ==="
          # Parse the mux summary: "video:NKiB audio:NKiB subtitle:... other:..."
          # At 192 kb/s, audio should be ~24 KiB/sec. A silent AAC track
          # compresses down to ~1 KiB/sec or less. Floor at 5 KiB/sec keeps
          # plenty of margin for real content while catching placeholders.
          AUDIO_KIB=$(echo "$NORMALIZE_LOG" | grep -oE 'audio:[0-9]+KiB' | head -1 | grep -oE '[0-9]+' || true)
          MIN_AUDIO_KIB=$(printf '%.0f' "$(echo "$DURATION * 5" | bc)")
          echo "Encoded audio: ${AUDIO_KIB:-0}KiB (min expected: ${MIN_AUDIO_KIB}KiB for ${DURATION}s at 192kb/s)"

          if [ -z "$AUDIO_KIB" ] || [ "$AUDIO_KIB" -lt "$MIN_AUDIO_KIB" ]; then
            echo "::error::Encoded audio is ${AUDIO_KIB:-0}KiB — source track is likely silent or corrupt (public/audio/background-music.wav)"
            exit 1
          fi

          echo "=== Stream inventory ==="
          npx remotion ffprobe -v error -show_streams \
            -show_entries stream=index,codec_type,codec_name,sample_rate,channels,bit_rate,duration \
            -of default=noprint_wrappers=1 "$OUTFILE"

          echo "=== Silence probe ==="
          # Remotion's ffmpeg allowlist has silencedetect but not volumedetect.
          # noise=-40dB catches anything below roughly whisper level.
          SILENCE_OUTPUT=$(npx remotion ffmpeg -hide_banner -nostats \
            -i "$OUTFILE" -af "silencedetect=noise=-40dB:d=0.1" -vn -f null - 2>&1 || true)
          echo "$SILENCE_OUTPUT"

          TOTAL_SILENCE=$(echo "$SILENCE_OUTPUT" | awk '
            /silence_duration:/ {
              for (i=1; i<=NF; i++) if ($i == "silence_duration:") { sum += $(i+1); next }
            }
            END { printf "%.3f", (sum + 0) }')
          echo "Total silence: ${TOTAL_SILENCE}s of ${DURATION}s"

          MAX_SILENCE=$(echo "$DURATION * 0.8" | bc)
          IS_SILENT=$(echo "$TOTAL_SILENCE > $MAX_SILENCE" | bc)
          if [ "$IS_SILENT" = "1" ]; then
            echo "::error::Audio is >80% silent (${TOTAL_SILENCE}s / ${DURATION}s)"
            exit 1
          fi

          echo "audio_verified=true" >> "$GITHUB_OUTPUT"
          echo "audio_kib=${AUDIO_KIB}" >> "$GITHUB_OUTPUT"
          echo "total_silence_s=${TOTAL_SILENCE}" >> "$GITHUB_OUTPUT"
          echo "Audio confirmed (${AUDIO_KIB}KiB, ${TOTAL_SILENCE}s silence) — proceeding to upload"

      - name: Upload to Vercel Blob
        id: upload
        run: |
          FILENAME="${{ inputs.output_filename }}.mp4"
          DATE_PREFIX=$(date -u +%Y-%m-%d)
          BLOB_PATH="social-videos/${DATE_PREFIX}/${FILENAME}"

          RESPONSE=$(curl -s -X PUT \
            "https://blob.vercel-storage.com/${BLOB_PATH}" \
            -H "Authorization: Bearer ${BLOB_READ_WRITE_TOKEN}" \
            -H "x-content-type: video/mp4" \
            -H "x-cache-control-max-age: 31536000" \
            --data-binary "@/tmp/${FILENAME}")

          VIDEO_URL=$(echo "$RESPONSE" | jq -r '.url')

          if [ "$VIDEO_URL" = "null" ] || [ -z "$VIDEO_URL" ]; then
            echo "::error::Upload failed: $RESPONSE"
            exit 1
          fi

          echo "video_url=${VIDEO_URL}" >> "$GITHUB_OUTPUT"
          echo "Uploaded: ${VIDEO_URL}"
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Callback to publish posts
        run: |
          curl -s -X POST \
            "${SITE_URL}/api/admin/social/video-callback" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -d "{
              \"postIds\": \"${{ inputs.post_ids }}\",
              \"videoUrl\": \"${{ steps.upload.outputs.video_url }}\",
              \"status\": \"rendered\",
              \"audioVerified\": ${{ steps.normalize.outputs.audio_verified == 'true' }},
              \"audioKib\": \"${{ steps.normalize.outputs.audio_kib }}\",
              \"totalSilenceS\": \"${{ steps.normalize.outputs.total_silence_s }}\"
            }"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Report failure
        if: failure()
        run: |
          curl -s -X POST \
            "${SITE_URL}/api/admin/social/video-callback" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -d "{
              \"postIds\": \"${{ inputs.post_ids }}\",
              \"status\": \"failed\",
              \"error\": \"GitHub Actions render failed — check workflow run logs\"
            }"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
