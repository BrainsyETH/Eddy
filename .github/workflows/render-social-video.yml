# .github/workflows/render-social-video.yml
# Renders a Remotion composition to MP4 and publishes to social platforms.
#
# The render + audio mux/validation run in the prebuilt container via
# render-reusable.yml (audio_mode=social); this workflow just kicks that off and
# publishes from the one rendered file (the callback fans out to Instagram +
# Facebook). Kept as workflow_dispatch so the app's API dispatch is unchanged.

name: Render Social Video

on:
  workflow_dispatch:
    inputs:
      post_ids:
        description: 'Comma-separated social_posts record IDs to publish after render'
        required: true
        type: string
      composition_id:
        description: 'Remotion composition ID (e.g. social-gauge-portrait)'
        required: true
        type: string
      input_props:
        description: 'JSON-encoded input props for the composition'
        required: true
        type: string
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string

# packages:read so the reusable render job can pull the private GHCR render image.
permissions:
  contents: read
  packages: read

jobs:
  render:
    uses: ./.github/workflows/render-reusable.yml
    with:
      composition_id: ${{ inputs.composition_id }}
      input_props: ${{ inputs.input_props }}
      output_filename: ${{ inputs.output_filename }}
      blob_prefix: social-videos
      audio_mode: social
    secrets: inherit

  callback:
    needs: render
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Callback to publish posts
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Retry the callback up to 3 times with backoff. A Vercel cold start can
          # blow past the default curl deadline; without retries a rendered +
          # uploaded video would sit in 'rendering' until the stale-reaper killed it.
          PAYLOAD=$(cat <<EOF
          {
            "postIds": "${{ inputs.post_ids }}",
            "videoUrl": "${{ needs.render.outputs.clip_url }}",
            "status": "rendered",
            "audioVerified": ${{ needs.render.outputs.audio_verified == 'true' }},
            "audioKib": "${{ needs.render.outputs.audio_kib }}",
            "totalSilenceS": "${{ needs.render.outputs.total_silence_s }}"
          }
          EOF
          )
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/callback-resp.txt -w '%{http_code}' \
              --max-time 60 \
              -X POST "${SITE_URL}/api/admin/social/video-callback" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -d "$PAYLOAD" || echo "000")
            echo "Callback attempt ${attempt}: HTTP ${HTTP_CODE}"
            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/callback-resp.txt
              exit 0
            fi
            cat /tmp/callback-resp.txt || true
            if [ "$attempt" -lt 3 ]; then
              SLEEP=$((attempt * 5))
              echo "Retrying in ${SLEEP}s..."
              sleep "$SLEEP"
            fi
          done
          echo "::error::Callback failed after 3 attempts — video uploaded but post stuck in rendering"
          exit 1

  # Runs if the render or callback failed, so a stuck post is reported instead of
  # silently sitting in 'rendering'.
  report-failure:
    needs: [render, callback]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report failure
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "postIds": "${{ inputs.post_ids }}",
            "status": "failed",
            "error": "GitHub Actions render failed — check workflow run logs"
          }
          EOF
          )
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/callback-resp.txt -w '%{http_code}' \
              --max-time 60 \
              -X POST "${SITE_URL}/api/admin/social/video-callback" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -d "$PAYLOAD" || echo "000")
            echo "Failure-report attempt ${attempt}: HTTP ${HTTP_CODE}"
            if [ "$HTTP_CODE" = "200" ]; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done
