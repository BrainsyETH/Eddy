# .github/workflows/build-remotion-image.yml
# Builds + pushes the prebuilt render image (deps + Chrome Headless Shell +
# bundle) to GHCR. render-reusable.yml renders inside this image, so a render is
# seconds instead of a multi-minute cold start. Rebuilt whenever the Remotion
# subproject changes on main; also dispatchable to seed/refresh the image.
#
# The image bakes private composition source, so the package stays PRIVATE and
# render jobs pull it with the job's GITHUB_TOKEN (packages: read).

name: Build Remotion Image

on:
  push:
    branches: [main]
    paths:
      - 'missouri-float-planner/remotion/**'
      - '.github/workflows/build-remotion-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # The default buildx 'docker' driver can't export the gha cache (the build
      # fails immediately with "Cache export is not supported"). setup-buildx
      # provides the docker-container driver that supports it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          # Owner lowercased for GHCR (BrainsyETH -> brainsyeth).
          context: missouri-float-planner/remotion
          push: true
          tags: |
            ghcr.io/brainsyeth/eddy-remotion:latest
            ghcr.io/brainsyeth/eddy-remotion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
