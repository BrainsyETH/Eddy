# .github/workflows/brand-check-clip.yml
# ClipEngine: Brand safety review of clips using Claude vision.
#
# Extracts frames, sends to Claude Sonnet for brand safety evaluation.
# Updates clip_library with the verdict (PUBLISH / REVIEW / REJECT) and a
# scene_description / scene_tags captured from the same frames, which the
# clip caption generator later uses to ground captions in the actual footage.

name: Brand Check Clip

on:
  workflow_dispatch:
    inputs:
      clip_id:
        description: 'clip_library UUID to check'
        required: true
        type: string
      clip_url:
        description: 'Direct URL to the clip video'
        required: true
        type: string

jobs:
  brand-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - name: Extract frames and evaluate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLIP_ID: ${{ inputs.clip_id }}
          CLIP_URL: ${{ inputs.clip_url }}
        run: |
          set -e
          # Exported so the Python step below sees it (it reads WORK_DIR from the
          # environment; without export it fell back to /tmp and found no frames).
          export WORK_DIR=$(mktemp -d)

          # Download clip
          echo "Downloading clip..."
          curl -sL -o "$WORK_DIR/clip.mp4" "$CLIP_URL"

          # Get duration
          DURATION=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$WORK_DIR/clip.mp4" 2>/dev/null | cut -d. -f1)
          DURATION=${DURATION:-10}

          # Extract 3 frames at 10%, 50%, 90%
          echo "Extracting frames..."
          for PCT in 10 50 90; do
            TIMESTAMP=$(( DURATION * PCT / 100 ))
            ffmpeg -y -ss "$TIMESTAMP" -i "$WORK_DIR/clip.mp4" \
              -frames:v 1 -q:v 2 \
              "$WORK_DIR/frame_${PCT}.jpg" 2>/dev/null
          done

          echo "Evaluating with Claude vision..."

          # Send frames to Claude for brand safety review
          cat > /tmp/brand_check.py << 'PYEOF'
          import json, base64, os, urllib.request, ssl, re

          try:
              import certifi
              ssl_ctx = ssl.create_default_context(cafile=certifi.where())
          except ImportError:
              ssl_ctx = ssl.create_default_context()

          api_key = os.environ["ANTHROPIC_API_KEY"]
          clip_id = os.environ["CLIP_ID"]
          supabase_url = os.environ["SUPABASE_URL"]
          supabase_key = os.environ["SUPABASE_KEY"]
          work_dir = os.environ.get("WORK_DIR", "/tmp")

          frames = []
          for pct in [10, 50, 90]:
              path = os.path.join(work_dir, f"frame_{pct}.jpg")
              if os.path.exists(path):
                  with open(path, "rb") as f:
                      frames.append({
                          "type": "image",
                          "source": {
                              "type": "base64",
                              "media_type": "image/jpeg",
                              "data": base64.b64encode(f.read()).decode(),
                          },
                      })

          if not frames:
              print("No frames extracted")
              exit(1)

          prompt_text = (
              "You are reviewing video frames from a clip that will be posted on the "
              "Eddy.guide Instagram account (a Missouri float trip / river conditions guide).\n\n"
              "Evaluate these 3 frames (from the beginning, middle, and end of the clip) for:\n"
              "1. BRAND SAFETY: No offensive content, violence, dangerous behavior, alcohol/drug use, nudity\n"
              "2. VISUAL QUALITY: Good resolution, not blurry, properly lit, visually engaging\n"
              "3. BRAND ALIGNMENT: Content relates to rivers, floating, kayaking, canoeing, nature, fishing, or outdoor recreation in Missouri\n"
              "4. OVERLAY ISSUES: No obstructive watermarks, logos, or text that would conflict with Eddy branding\n\n"
              "Also DESCRIBE what the clip shows, for use in writing a social caption. "
              "Base it ONLY on what is visible in these frames: the watercraft (kayak, "
              "canoe, raft, tube, or none), the water character (calm, riffles, rapids, "
              "clear, muddy), the scenery (bluffs, gravel bars, tree cover, sky), and any "
              "notable action. Be concrete, factual, and present tense. No marketing "
              "language, no invented details, and do NOT name the river (it may be unknown). "
              "Describe foliage only by its literal appearance (e.g. green leaves, bare "
              "branches, brown/golden leaves) and do NOT state or infer a season, month, or "
              "time of year — the clip's filming date is unknown and it may be reposted from "
              "another season.\n\n"
              'Respond with a JSON object:\n'
              '{"verdict": "PUBLISH" | "REVIEW" | "REJECT", "confidence": 0.0-1.0, '
              '"brand_safe": true/false, "visual_quality": "good" | "acceptable" | "poor", '
              '"brand_aligned": true/false, "overlay_issues": true/false, '
              '"scene_description": "1-2 sentences describing what is visible in the clip", '
              '"scene_tags": ["3 to 6 short lowercase tags, e.g. kayak, riffles, bluff, clear-water"], '
              '"reasoning": "Brief explanation of the verdict"}\n\n'
              "PUBLISH = safe to post automatically\n"
              "REVIEW = human should review before posting\n"
              "REJECT = do not post"
          )

          content = frames + [{"type": "text", "text": prompt_text}]

          body = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 500,
              "messages": [{"role": "user", "content": content}],
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=30, context=ssl_ctx) as resp:
                  data = json.loads(resp.read())
                  text = data["content"][0]["text"]
                  json_match = re.search(r'\{[^{}]+\}', text, re.DOTALL)
                  if json_match:
                      result = json.loads(json_match.group())
                  else:
                      result = {"verdict": "REVIEW", "reasoning": text}
          except Exception as e:
              print(f"Claude API error: {e}")
              result = {"verdict": "REVIEW", "reasoning": f"API error: {e}"}

          verdict = result.get("verdict", "REVIEW").lower()
          status_map = {"publish": "approved", "review": "review", "reject": "rejected"}
          status = status_map.get(verdict, "review")

          print(f"Verdict: {result.get('verdict', 'REVIEW')}")
          print(f"Reasoning: {result.get('reasoning', 'N/A')}")

          update_body = json.dumps({
              "brand_check_status": status,
              "brand_check_result": result,
              "updated_at": "now()",
          }).encode()

          update_req = urllib.request.Request(
              f"{supabase_url}/rest/v1/clip_library?id=eq.{clip_id}",
              data=update_body,
              headers={
                  "apikey": supabase_key,
                  "Authorization": f"Bearer {supabase_key}",
                  "Content-Type": "application/json",
                  "Prefer": "return=minimal",
              },
              method="PATCH",
          )

          try:
              with urllib.request.urlopen(update_req, timeout=10) as resp:
                  print(f"Updated clip {clip_id}: {status}")
          except Exception as e:
              print(f"Failed to update clip: {e}")
          PYEOF
          python3 /tmp/brand_check.py

      # If anything above failed (download, frame extraction, etc.) the clip would
      # otherwise sit in 'review' forever (the cron flipped it there before
      # dispatch). Mark it 'failed' with an error so it surfaces for retry.
      - name: Mark clip failed on workflow error
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLIP_ID: ${{ inputs.clip_id }}
        run: |
          curl -s -X PATCH \
            "${SUPABASE_URL}/rest/v1/clip_library?id=eq.${CLIP_ID}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"brand_check_status":"failed","brand_check_error":"Brand-check workflow failed (download/frame/eval) — see the Actions run logs"}' \
            || true
