# .github/workflows/youtube-clip-pipeline.yml
# ClipEngine: Monitor YouTube channels, extract best moments, finalize to Reels.
#
# Runs daily on schedule or via manual dispatch / API trigger.
# Extracts clips using heatmap data, applies Eddy branding, uploads to CDN.

name: YouTube Clip Pipeline

on:
  schedule:
    # Daily at 7 AM CST (13:00 UTC)
    - cron: '0 13 * * *'

  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Single YouTube URL to process (overrides channel scan)'
        required: false
        type: string
      river_slug:
        description: 'River slug for the clip (e.g. current, meramec)'
        required: false
        type: string
      peak_number:
        description: 'Which heatmap peak to use (1-5, default 1)'
        required: false
        type: string
        default: '1'
      max_clips:
        description: 'Maximum clips to extract per run'
        required: false
        type: string
        default: '3'
      videos_per_channel:
        description: 'How many recent uploads to scan per channel'
        required: false
        type: string
        default: '5'

jobs:
  extract-clips:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Dispatching render-clip.yml needs actions:write. The default GITHUB_TOKEN
    # can trigger workflow_dispatch; if your org restricts that, set a GH_PAT
    # secret (a PAT with the "workflow" scope) and it will be used instead.
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          pip install yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Verify ffmpeg
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1

      # yt-dlp needs a JavaScript runtime to extract YouTube formats reliably.
      - name: Install JS runtime (deno) for yt-dlp
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Process YouTube content
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          RIVER_SLUG: ${{ inputs.river_slug }}
          PEAK_NUMBER: ${{ inputs.peak_number || '1' }}
          MAX_CLIPS: ${{ inputs.max_clips || '3' }}
          VIDEOS_PER_CHANNEL: ${{ inputs.videos_per_channel || '5' }}
          YOUTUBE_CHANNELS_JSON: ${{ secrets.YOUTUBE_CHANNELS_JSON }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -e
          WORK_DIR=$(mktemp -d)
          RESULTS_JSON="$WORK_DIR/results.json"
          echo "[]" > "$RESULTS_JSON"

          # YouTube bot-blocks shared CI IPs; authenticated cookies are required
          # to download. Write the secret (Netscape cookies.txt format) to a file
          # the scripts pass to yt-dlp via YOUTUBE_COOKIES_FILE.
          if [ -n "$YOUTUBE_COOKIES" ]; then
            export YOUTUBE_COOKIES_FILE="$WORK_DIR/cookies.txt"
            printf '%s\n' "$YOUTUBE_COOKIES" > "$YOUTUBE_COOKIES_FILE"
            echo "🔑 Using authenticated YouTube cookies"
          else
            echo "⚠️ No YOUTUBE_COOKIES secret set — YouTube will likely block downloads on CI (bot check)."
          fi

          process_video() {
            local URL="$1"
            local RIVER="$2"
            local PEAK="$3"
            local VIDEO_DIR=$(mktemp -d)

            echo ""
            echo "════════════════════════════════════════════"
            echo "Processing: $URL"
            echo "River: ${RIVER:-auto-detect}"
            echo "════════════════════════════════════════════"

            # Step 1: Scrape heatmap. Never let one video abort the batch.
            echo "→ Scraping heatmap..."
            bash scripts/clipengine/scrape-heatmap.sh "$URL" "$VIDEO_DIR" || true

            if [ ! -f "$VIDEO_DIR/heatmap-data.json" ]; then
              echo "⚠️ No heatmap data, skipping"
              rm -rf "$VIDEO_DIR"
              return
            fi

            # Extract peak info
            local VIDEO_ID=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); print(d['video_id'])")
            local CHANNEL=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); print(d.get('channel','Unknown'))")

            # River is detected per-video by scrape-heatmap (a channel covers many
            # rivers). A dispatch/channel river_slug overrides; otherwise use the
            # detected one. No river at all → skip (only known-river clips post).
            local DETECTED_RIVER=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); print(d.get('river_slug','') or '')")
            if [ -z "$RIVER" ]; then RIVER="$DETECTED_RIVER"; fi
            if [ -z "$RIVER" ]; then
              echo "⚠️ No Eddy river detected for $VIDEO_ID, skipping"
              rm -rf "$VIDEO_DIR"
              return
            fi
            echo "River (resolved): $RIVER"

            local PEAK_IDX=$((PEAK - 1))
            local PEAK_START=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); peaks=d.get('peaks',[]); print(peaks[$PEAK_IDX]['start_secs'] if len(peaks)>$PEAK_IDX else '')")
            local PEAK_DURATION=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); peaks=d.get('peaks',[]); print(peaks[$PEAK_IDX].get('duration_secs',13) if len(peaks)>$PEAK_IDX else '')")
            local PEAK_SCORE=$(python3 -c "import json; d=json.load(open('$VIDEO_DIR/heatmap-data.json')); peaks=d.get('peaks',[]); print(peaks[$PEAK_IDX].get('score',0) if len(peaks)>$PEAK_IDX else '')")

            if [ -z "$PEAK_START" ]; then
              echo "⚠️ No peak at position $PEAK, skipping"
              rm -rf "$VIDEO_DIR"
              return
            fi

            # Check for duplicates in Supabase
            if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
              local EXISTING=$(curl -s \
                "${SUPABASE_URL}/rest/v1/clip_library?youtube_video_id=eq.${VIDEO_ID}&clip_start_secs=eq.${PEAK_START}&select=id" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" 2>/dev/null)
              if echo "$EXISTING" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d else 1)" 2>/dev/null; then
                echo "⚠️ Clip already exists for $VIDEO_ID at ${PEAK_START}s, skipping"
                rm -rf "$VIDEO_DIR"
                return
              fi
            fi

            # Step 2: Extract clip
            echo "→ Extracting clip at ${PEAK_START}s for ${PEAK_DURATION}s..."
            local RAW_CLIP="$VIDEO_DIR/raw-clip.mp4"
            bash scripts/clipengine/extract-clip.sh "$URL" "$PEAK_START" "$PEAK_DURATION" "$RAW_CLIP" --transcript || true

            if [ ! -f "$RAW_CLIP" ]; then
              echo "⚠️ Clip extraction failed, skipping"
              rm -rf "$VIDEO_DIR"
              return
            fi

            # Step 3: Brand via Remotion (the render pipeline) — not ffmpeg.
            # Upload the RAW clip, then dispatch render-clip.yml, which wraps it
            # in the clip-reel composition, uploads the branded result, and
            # inserts clip_library (pending). Branding happens ONLY there, so
            # clips match every other Eddy reel and are never branded twice.
            echo "→ Resolving river display name..."
            local RIVER_NAME="$RIVER"
            if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
              local RIVER_RESP=$(curl -s \
                "${SUPABASE_URL}/rest/v1/rivers?slug=eq.${RIVER}&select=name" \
                -H "apikey: ${SUPABASE_KEY}" -H "Authorization: Bearer ${SUPABASE_KEY}" 2>/dev/null || echo "")
              local RESOLVED=$(echo "$RIVER_RESP" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '[]'); print(d[0]['name'] if d else '')" 2>/dev/null || echo "")
              [ -n "$RESOLVED" ] && RIVER_NAME="$RESOLVED"
            fi

            echo "→ Uploading RAW clip to CDN for Remotion..."
            local DATE_PREFIX=$(date -u +%Y-%m-%d)
            local RAW_BLOB_PATH="clips-raw/${DATE_PREFIX}/${VIDEO_ID}-peak${PEAK}.mp4"
            local UPLOAD_RESPONSE=$(curl -s -X PUT \
              "https://blob.vercel-storage.com/${RAW_BLOB_PATH}" \
              -H "Authorization: Bearer ${BLOB_READ_WRITE_TOKEN}" \
              -H "x-content-type: video/mp4" \
              --data-binary "@${RAW_CLIP}")

            local RAW_URL=$(echo "$UPLOAD_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('url',''))" 2>/dev/null || echo "")

            if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
              echo "⚠️ Raw upload failed: $UPLOAD_RESPONSE"
              rm -rf "$VIDEO_DIR"
              return
            fi
            echo "✅ Raw uploaded: $RAW_URL"

            # Timed captions from the transcript (parity with the old burn-in).
            # extract-clip.sh --transcript copies the VTT next to the raw clip.
            local CAPTIONS_JSON="[]"
            if [ -f "$VIDEO_DIR/transcript.en.vtt" ]; then
              CAPTIONS_JSON=$(python3 scripts/clipengine/vtt-to-captions.py \
                "$VIDEO_DIR/transcript.en.vtt" "$PEAK_START" "${PEAK_DURATION:-13}" 2>/dev/null || echo "[]")
            fi

            # Source orientation drives band (landscape) vs full-bleed (vertical)
            # framing in the Remotion composition.
            local SRC_DIMS=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=width,height -of csv=s=x:p=0 "$RAW_CLIP" 2>/dev/null)
            local SRC_ORIENT="landscape"
            [ "$(echo "$SRC_DIMS" | cut -dx -f2)" -gt "$(echo "$SRC_DIMS" | cut -dx -f1)" ] 2>/dev/null && SRC_ORIENT="portrait"

            echo "→ Dispatching render-clip (Remotion branding)..."
            if gh workflow run render-clip.yml --ref main \
              -f video_url="$RAW_URL" \
              -f youtube_video_id="$VIDEO_ID" \
              -f river_slug="$RIVER" \
              -f river_name="$RIVER_NAME" \
              -f creator="$CHANNEL" \
              -f source_url="$URL" \
              -f youtube_channel="$CHANNEL" \
              -f peak_number="$PEAK" \
              -f duration_secs="${PEAK_DURATION:-13}" \
              -f clip_start_secs="$PEAK_START" \
              -f orientation="portrait" \
              -f heatmap_score="$PEAK_SCORE" \
              -f captions="$CAPTIONS_JSON" \
              -f source_orientation="$SRC_ORIENT"; then
              echo "✅ Dispatched render-clip — it brands the clip and inserts clip_library (pending)."
            else
              echo "⚠️ Could not dispatch render-clip (needs actions:write + a token allowed to dispatch). Skipping."
              rm -rf "$VIDEO_DIR"
              return
            fi

            # Count this as a produced clip (drives MAX_CLIPS + the run summary).
            python3 -c "
          import json
          r = json.load(open('$RESULTS_JSON'))
          r.append({
              'youtube_video_id': '$VIDEO_ID',
              'river_slug': '${RIVER:-}',
              'peak': $PEAK,
              'raw_url': '$RAW_URL',
              'dispatched': True,
          })
          json.dump(r, open('$RESULTS_JSON', 'w'), indent=2)
          "

            rm -rf "$VIDEO_DIR"
          }

          # Process: either a single URL (manual dispatch) or scan the
          # configured channels (scheduled daily run).
          if [ -n "$YOUTUBE_URL" ]; then
            process_video "$YOUTUBE_URL" "$RIVER_SLUG" "$PEAK_NUMBER"
          elif [ -n "$YOUTUBE_CHANNELS_JSON" ]; then
            VIDEOS_PER_CHANNEL="${VIDEOS_PER_CHANNEL:-5}"
            echo "→ Scanning channels (newest $VIDEOS_PER_CHANNEL per channel, up to $MAX_CLIPS new clips)"
            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
              echo "⚠️ SUPABASE_URL/KEY not set — cannot dedup; the same videos will be re-clipped each run."
            fi

            CANDIDATES="$WORK_DIR/candidates.txt"
            : > "$CANDIDATES"

            # Expand YOUTUBE_CHANNELS_JSON (array of channel URLs, or objects
            # {url, river_slug}) into newest-first "videoUrl<TAB>river" rows.
            # Process substitution keeps the loops in this shell so the
            # MAX_CLIPS counter (read from RESULTS_JSON) stays consistent.
            while IFS=$'\t' read -r CH_URL CH_RIVER; do
              [ -z "$CH_URL" ] && continue
              case "$CH_URL" in
                *"/videos"|*"watch?v="*|*"youtu.be/"*) LIST_URL="$CH_URL" ;;
                *) LIST_URL="${CH_URL%/}/videos" ;;
              esac
              echo "  • $LIST_URL"
              while read -r VID; do
                [ -z "$VID" ] && continue
                printf '%s\t%s\n' "https://www.youtube.com/watch?v=${VID}" "$CH_RIVER" >> "$CANDIDATES"
              done < <(yt-dlp --flat-playlist --playlist-end "$VIDEOS_PER_CHANNEL" --print "%(id)s" "$LIST_URL" 2>/dev/null || true)
            done < <(echo "$YOUTUBE_CHANNELS_JSON" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
          except Exception as e:
              sys.stderr.write('Invalid YOUTUBE_CHANNELS_JSON: %s\n' % e); sys.exit(0)
          for c in data:
              if isinstance(c, str):
                  print(c + '\t')
              else:
                  print((c.get('url') or '') + '\t' + (c.get('river_slug') or ''))
          ")

            CAND_TOTAL=$(wc -l < "$CANDIDATES" | tr -d ' ')
            echo "  Found ${CAND_TOTAL} candidate video(s)"

            while IFS=$'\t' read -r VURL VRIVER; do
              [ -z "$VURL" ] && continue
              DONE=$(python3 -c "import json; print(len(json.load(open('$RESULTS_JSON'))))" 2>/dev/null || echo 0)
              if [ "$DONE" -ge "$MAX_CLIPS" ]; then
                echo "  Reached MAX_CLIPS=$MAX_CLIPS — stopping"
                break
              fi
              # Skip videos that already have a clip in the library (video-level
              # dedup so daily runs don't re-process the same uploads).
              if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
                VID="${VURL##*v=}"
                EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/clip_library?youtube_video_id=eq.${VID}&select=id&limit=1" \
                  -H "apikey: ${SUPABASE_KEY}" -H "Authorization: Bearer ${SUPABASE_KEY}" 2>/dev/null || echo "")
                # Only a JSON ARRAY with rows means "exists". A non-array (e.g. a
                # PostgREST error object from a bad key/RLS) must NOT be read as a
                # hit — fail open and log the raw response so the cause is visible.
                DEDUP=$(echo "$EXISTING" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or 'null'); print('exists' if isinstance(d,list) and d else ('new' if isinstance(d,list) else 'error'))" 2>/dev/null || echo error)
                if [ "$DEDUP" = "exists" ]; then
                  echo "  ⏭️  ${VID} already in library, skipping"
                  continue
                elif [ "$DEDUP" = "error" ]; then
                  echo "  ⚠️ dedup check failed for ${VID} — Supabase response: $(printf '%s' "$EXISTING" | head -c 140) — proceeding without dedup"
                fi
              fi
              process_video "$VURL" "$VRIVER" "$PEAK_NUMBER"
            done < "$CANDIDATES"
          else
            echo "ℹ️ No youtube_url input and no YOUTUBE_CHANNELS_JSON secret — nothing to do."
            echo "  Set YOUTUBE_CHANNELS_JSON (array of channel URLs or {url, river_slug} objects)"
            echo "  to enable daily channel scanning, or dispatch manually with a youtube_url input."
          fi

          # Report results
          TOTAL=$(python3 -c "import json; print(len(json.load(open('$RESULTS_JSON'))))")
          echo ""
          echo "════════════════════════════════════════════"
          echo "📊 Pipeline Results: $TOTAL render(s) dispatched"
          echo "════════════════════════════════════════════"
          python3 -c "import json; [print(f'  • {c[\"youtube_video_id\"]} (peak {c.get(\"peak\")}) → render-clip dispatched') for c in json.load(open('$RESULTS_JSON'))]"

          # Save results for the summary step
          cp "$RESULTS_JSON" "$GITHUB_WORKSPACE/clip-results.json"

      - name: Summary
        if: success()
        run: |
          TOTAL=$(python3 -c "import json; print(len(json.load(open('$GITHUB_WORKSPACE/clip-results.json'))))" 2>/dev/null || echo 0)
          echo "Dispatched $TOTAL render-clip run(s)."
          echo "Each one brands its clip with Remotion and inserts clip_library"
          echo "(brand_check_status=pending); the brand-check + auto-post crons take"
          echo "it from there. Clips appear in the library as those renders finish."

      - name: Report failure
        if: failure()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SITE_URL" ] && [ -n "$CRON_SECRET" ]; then
            curl -s -X POST \
              "${SITE_URL}/api/admin/clips/callback" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -d '{"status": "failed", "error": "YouTube clip pipeline failed — check workflow logs"}' || true
          fi
