# .github/workflows/remotion-check.yml
# Guardrail for the Remotion subproject: typecheck + a render smoke test, so a
# broken composition (or type drift like the standing errors this enforces away)
# fails in CI instead of at a live clip/reel render.

name: Remotion Check

on:
  pull_request:
    paths:
      - 'missouri-float-planner/remotion/**'
      - '.github/workflows/remotion-check.yml'
  push:
    branches: [main]
    paths:
      - 'missouri-float-planner/remotion/**'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: missouri-float-planner/remotion
    env:
      # Remotion ships its own headless Chrome; skip Puppeteer's download.
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: missouri-float-planner/remotion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Render smoke test
        # One still per data-driven composition catches runtime crashes with the
        # registered defaultProps. clip-reel is skipped — it needs an external
        # source video — so its frame is exercised by the others' shared chrome.
        run: |
          set -e
          mkdir -p /tmp/stills
          for comp in \
            social-route-portrait \
            social-section-portrait \
            social-gauge \
            social-trend-portrait \
            social-digest; do
            echo "→ rendering still: $comp"
            npx remotion still --entry-point=src/index.ts --public-dir=./public \
              "$comp" "/tmp/stills/${comp}.png" --frame=120
          done
          ls -la /tmp/stills
